name: otel_shelf
description: OpenTelemetry instrumentation for `package:shelf`. Server-side
  Middleware that opens a SERVER span per request, extracts the W3C
  traceparent from inbound headers, and records `http.*` semconv attrs.
version: 0.1.0-beta.1-wip
repository: https://github.com/dartastic/otel_shelf
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  shelf: ^1.4.0

dev_dependencies:
  dart_flutter_team_lints: ^3.5.2
  pub_semver: ^2.0.0
  pubspec_parse: ^1.5.0
  test: ^1.26.3
